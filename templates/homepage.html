{% extends "base.html" %}
{% load static %}

{% block title %} Home | Music Collectors Catalogue {% endblock %}

{% block body_class %}home-page{% endblock %}

{% block content %}
<div class="home-surface brand-surface">
    <section class="home-stack">
        <div class="home-center">
            <h1 class="home-title">THE CATALOGUE</h1>
            <p class="home-sub">Browse albums and artists.</p>
            {% comment %} <div class="home-actions">
                <a href="{% url 'albums' %}" class="btn btn--ghost">Explore Albums</a>
                <a href="{% url 'artists' %}" class="btn btn--ghost">Browse Artists</a>
            </div> {% endcomment %}
        </div>
        <div class="home-hero">
            <img
                class="home-hero__img"
                src="{% static 'images/vinyl-half.png' %}"
                alt="Vinyl record"
            >
        </div>

    </section>
</div>
{% endblock %}
